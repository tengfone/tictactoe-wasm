<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe (Rust + WASM + WebGL)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div class="title-row">
          <h1>Tic Tac Toe</h1>
          <span class="pill">WebGL</span>
        </div>
        <p id="score" class="score-chip">You 0 · AI 0 · Draw 0</p>
        <p id="status" class="status"></p>
        <p id="mode" class="mode-chip">Mode: Smart AI</p>
        <p id="move-log" class="move-log">Moves: –</p>
      </header>
      <div class="button-row">
        <button id="mode-toggle" type="button">Play 1v1</button>
        <button id="quality-toggle" type="button">Quality: Cinematic</button>
        <button id="difficulty-toggle" type="button">AI: Smart</button>
        <button id="sound-toggle" type="button">Sound: On</button>
        <button id="replay-button" type="button">Replay Last</button>
        <button id="reset-score" type="button">Reset scores</button>
        <button id="reset" type="button">Reset game</button>
      </div>
      <section class="viewport" id="viewport" aria-label="3D board"></section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
