<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe (Rust + WASM + WebGL)</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div class="title-row">
          <h1>Tic Tac Toe</h1>
          <span class="pill">WebGL</span>
        </div>
        <p id="status" class="status"></p>
        <p id="mode" class="mode-chip">Mode: Smart AI</p>
      </header>
      <div class="button-row">
        <button id="mode-toggle" type="button">Play 1v1</button>
        <button id="reset" type="button">Reset game</button>
      </div>
      <section class="viewport" id="viewport" aria-label="3D board"></section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
